<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مدير الميزانية الذكي 2026</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2c3e50">
    <link rel="apple-touch-icon" href="icon-192.png">
    
    <style>
        :root {
            --bg-color: #f4f6f9;
            --card-bg: #ffffff;
            --text-color: #333;
            --primary: #2c3e50;
            --accent: #27ae60;
            --danger: #e74c3c;
            --warning: #f39c12;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 15px;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            color: var(--primary);
            font-size: 1.6rem;
            margin-bottom: 20px;
        }

        .card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            margin-bottom: 25px;
        }

        .section-title {
            font-size: 1.15rem;
            border-bottom: 2px solid var(--primary);
            padding-bottom: 8px;
            margin-bottom: 15px;
            color: var(--primary);
            font-weight: bold;
        }

        .input-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            font-size: 0.9rem;
        }

        input[type="number"], input[type="text"] {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 1rem;
        }
        
        input[type="number"] { text-align: center; }

        /* نموذج إضافة مصروف جديد */
        .add-expense-form {
            background: #f8f9fa;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 15px;
            border: 1px dashed #ccc;
        }
        
        .form-row {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
        }
        
        .form-row input[type="text"] { flex: 2; }
        .form-row input[type="number"] { flex: 1; }

        .btn {
            width: 100%;
            padding: 10px;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            font-size: 0.95rem;
            transition: 0.2s;
        }
        
        .btn-add { background: var(--primary); color: white; }
        .btn-add:hover { background: #1a252f; }

        /* قائمة المصاريف الديناميكية */
        .expense-list {
            margin-top: 15px;
        }

        .expense-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 5px;
            border-bottom: 1px solid #eee;
            gap: 8px;
        }

        .expense-details {
            display: flex;
            flex-grow: 1;
            justify-content: space-between;
            align-items: center;
        }

        .expense-name { font-weight: 500; font-size: 0.95rem; }
        .expense-amount { font-weight: bold; color: #555; }

        /* أزرار التحكم بالتعديل والحذف */
        .action-btns {
            display: flex;
            gap: 5px;
        }

        .btn-action {
            padding: 6px 10px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.8rem;
            color: white;
        }

        .btn-edit { background: var(--warning); }
        .btn-delete { background: var(--danger); }

        .result-box {
            background: #ecf0f1;
            padding: 12px;
            border-radius: 8px;
            margin-top: 15px;
            font-weight: bold;
            text-align: center;
            font-size: 1.05rem;
        }

        .highlight-green { color: var(--accent); }

        .total-card {
            background: var(--primary);
            color: white;
            text-align: center;
            padding: 20px;
            border-radius: 15px;
            font-size: 1.1rem;
            margin-top: 20px;
        }

        .total-card span {
            display: block;
            font-size: 1.7rem;
            font-weight: bold;
            margin-top: 10px;
            color: #2ecc71;
        }

        #installBtn {
            display: none;
            width: 100%;
            padding: 12px;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: bold;
            margin-bottom: 20px;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>📊 مدير الميزانية الشخصية المتطور</h1>
    <button id="installBtn">📲 تثبيت التطبيق على الهاتف</button>

    <!-- قســم مصاريــف البيــت -->
    <div class="card">
        <div class="section-title">🏠 مصاريف البيت (يونيو 6/2026)</div>
        
        <div class="input-group">
            <label>💰 إجمالي المبلغ المرصود للبيت:</label>
            <input type="number" id="house_budget" value="27000" oninput="updateHouseBudget(this.value)">
        </div>

        <!-- استمارة إضافة مصروف بيت جديد -->
        <div class="add-expense-form">
            <div class="form-row">
                <input type="text" id="new_house_name" placeholder="مثال: لحوم وخضار...">
                <input type="number" id="new_house_amount" placeholder="المبلغ">
            </div>
            <button class="btn btn-add" onclick="addExpense('house')">➕ إضافة بند مصروف للبيت</button>
        </div>

        <!-- قائمة مصاريف البيت الديناميكية -->
        <div id="house_expenses_container" class="expense-list"></div>

        <div class="result-box">
            المبلغ المتبقي من مصروف البيت: <span id="house_remaining" class="highlight-green">0</span> جنيه
        </div>
    </div>

    <!-- قســم مصاريــف حــازم -->
    <div class="card">
        <div class="section-title">🧑 مصاريف حازم الشخصية</div>

        <div class="input-group">
            <label>💰 إجمالي المبلغ المرصود لحازم:</label>
            <input type="number" id="hazem_budget" value="9000" oninput="updateHazemBudget(this.value)">
        </div>

        <!-- استمارة إضافة مصروف شخصي جديد -->
        <div class="add-expense-form">
            <div class="form-row">
                <input type="text" id="new_hazem_name" placeholder="مثال: اشتراك الجيم...">
                <input type="number" id="new_hazem_amount" placeholder="المبلغ">
            </div>
            <button class="btn btn-add" onclick="addExpense('hazem')">➕ إضافة بند مصروف شخصي</button>
        </div>

        <!-- قائمة مصاريف حازم الديناميكية -->
        <div id="hazem_expenses_container" class="expense-list"></div>

        <div class="result-box">
            المبلغ المتبقي من مصروف حازم: <span id="hazem_remaining" class="highlight-green">0</span> جنيه
        </div>
    </div>

    <!-- الإجمالي الكلي المحفوظ بالبنك وانستاباي -->
    <div class="total-card">
        إجمالي المتبقي (البنك + إنستاباي) حتى الآن
        <span id="grand_total">0 جنيه</span>
    </div>
</div>

<script>
    // البيانات الافتراضية المأخوذة من هيكلك الأساسي في حال عدم وجود بيانات محفوظة بالهاتف
    const defaultHouseExpenses = [
        { id: 1, name: "المصروف الشهري المرصود لماما", amount: 3500 },
        { id: 2, name: "صابون غسيل و جسم و يدين و شامبو و معجون و فرش أسنان", amount: 1000 },
        { id: 3, name: "أرز مصري و أرز بسمتي و خميرة", amount: 400 },
        { id: 4, name: "مواصلات مشوار حسام و فارس ذهاب و إياب", amount: 250 },
        { id: 5, name: "ديون البيت لشهر مايو 5/2026", amount: 1150 }
    ];

    const defaultHazemExpenses = [
        { id: 1, name: "حلاقة", amount: 200 },
        { id: 2, name: "عطر", amount: 700 },
        { id: 3, name: "طلعات و مصاريف خارجية و جانبية", amount: 1100 }
    ];

    // متغيرات الحالة العامة للتطبيق
    let data = {
        houseBudget: 27000,
        hazemBudget: 9000,
        houseExpenses: [],
        hazemExpenses: []
    };

    // تحميل البيانات عند بدء التشغيل
    window.onload = function() {
        if(localStorage.getItem('budget_app_data')) {
            data = JSON.parse(localStorage.getItem('budget_app_data'));
        } else {
            data.houseExpenses = defaultHouseExpenses;
            data.hazemExpenses = defaultHazemExpenses;
            saveDataToStorage();
        }
        
        // تعيين قيم ميزانيات البداية في الخانات
        document.getElementById('house_budget').value = data.houseBudget;
        document.getElementById('hazem_budget').value = data.hazemBudget;
        
        renderApp();
    };

    // حفظ البيانات في كاش الهاتف المحلي
    function saveDataToStorage() {
        localStorage.setItem('budget_app_data', JSON.stringify(data));
    }

    function updateHouseBudget(val) {
        data.houseBudget = parseFloat(val) || 0;
        saveDataToStorage();
        calculateAndDisplay();
    }

    function updateHazemBudget(val) {
        data.hazemBudget = parseFloat(val) || 0;
        saveDataToStorage();
        calculateAndDisplay();
    }

    // ميزة إضافة مصروف جديد
    function addExpense(type) {
        const nameInput = document.getElementById(`new_${type}_name`);
        const amountInput = document.getElementById(`new_${type}_amount`);
        
        const name = nameInput.value.trim();
        const amount = parseFloat(amountInput.value) || 0;
        
        if (name === "" || amount <= 0) {
            alert("الرجاء إدخال اسم المصروف وقيمة صحيحة أكبر من الصفر.");
            return;
        }

        const newExpense = {
            id: Date.now(), // معرف فريد باستخدام الوقت الحالي
            name: name,
            amount: amount
        };

        if(type === 'house') {
            data.houseExpenses.push(newExpense);
        } else {
            data.hazemExpenses.push(newExpense);
        }

        saveDataToStorage();
        renderApp();

        // تصفير حقول الإدخال بعد الإضافة بنجاح
        nameInput.value = "";
        amountInput.value = "";
    }

    // ميزة حذف مصروف
    function deleteExpense(type, id) {
        if(confirm("هل أنت متأكد من رغبتك في حذف هذا البند؟")) {
            if(type === 'house') {
                data.houseExpenses = data.houseExpenses.filter(item => item.id !== id);
            } else {
                data.hazemExpenses = data.hazemExpenses.filter(item => item.id !== id);
            }
            saveDataToStorage();
            renderApp();
        }
    }

    // ميزة تعديل مصروف قائم
    function editExpense(type, id) {
        const list = type === 'house' ? data.houseExpenses : data.hazemExpenses;
        const item = list.find(item => item.id === id);
        
        if(item) {
            const newName = prompt("تعديل اسم البند:", item.name);
            if (newName === null) return; // إلغاء العملية
            
            const newAmountStr = prompt("تعديل المبلغ (جنيه):", item.amount);
            if (newAmountStr === null) return; // إلغاء العملية
            
            const newAmount = parseFloat(newAmountStr) || 0;

            if(newName.trim() !== "" && newAmount > 0) {
                item.name = newName.trim();
                item.amount = newAmount;
                saveDataToStorage();
                renderApp();
            } else {
                alert("القيم المدخلة غير صالحة.");
            }
        }
    }

    // دالة لبناء عناصر القائمة وعرضها بالكامل بالواجهة
    function renderApp() {
        // بناء قائمة مصاريف البيت
        const houseContainer = document.getElementById('house_expenses_container');
        houseContainer.innerHTML = '';
        data.houseExpenses.forEach(item => {
            houseContainer.appendChild(createExpenseRow('house', item));
        });

        // بناء قائمة مصاريف حازم
        const hazemContainer = document.getElementById('hazem_expenses_container');
        hazemContainer.innerHTML = '';
        data.hazemExpenses.forEach(item => {
            hazemContainer.appendChild(createExpenseRow('hazem', item));
        });

        calculateAndDisplay();
    }

    // إنشاء سطر المصروف مع أزرار التحكم الخاصة به تكتيكياً
    function createExpenseRow(type, item) {
        const div = document.createElement('div');
        div.className = 'expense-item';
        
        div.innerHTML = `
            <div class="expense-details">
                <span class="expense-name">• ${item.name}</span>
                <span class="expense-amount">${item.amount} جنيه</span>
            </div>
            <div class="action-btns">
                <button class="btn-action btn-edit" onclick="editExpense('${type}', ${item.id})">✏️</button>
                <button class="btn-action btn-delete" onclick="deleteExpense('${type}', ${item.id})">❌</button>
            </div>
        `;
        return div;
    }

    // الحساب الرياضي الفوري والعرض
    function calculateAndDisplay() {
        const totalHouseExpenses = data.houseExpenses.reduce((sum, item) => sum + item.amount, 0);
        const houseRemaining = data.houseBudget - totalHouseExpenses;

        const totalHazemExpenses = data.hazemExpenses.reduce((sum, item) => sum + item.amount, 0);
        const hazemRemaining = data.hazemBudget - totalHazemExpenses;

        const grandTotal = houseRemaining + hazemRemaining;

        document.getElementById('house_remaining').innerText = houseRemaining.toLocaleString('ar-EG');
        document.getElementById('hazem_remaining').innerText = hazemRemaining.toLocaleString('ar-EG');
        document.getElementById('grand_total').innerText = grandTotal.toLocaleString('ar-EG') + " جنيه";
    }

    // تفعيل الـ Service Worker
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js').then(() => console.log("PWA Active"));
    }

    // كود زر التثبيت للأندرويد
    let deferredPrompt;
    window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        deferredPrompt = e;
        document.getElementById('installBtn').style.display = 'block';
    });

    document.getElementById('installBtn').addEventListener('click', async () => {
        if (deferredPrompt) {
            deferredPrompt.prompt();
            const { outcome } = await deferredPrompt.userChoice;
            if (outcome === 'accepted') document.getElementById('installBtn').style.display = 'none';
            deferredPrompt = null;
        }
    });
</script>
</body>
</html>
