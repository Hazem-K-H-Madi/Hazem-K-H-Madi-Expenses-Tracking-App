<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ميزانية يونيو 2026</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2c3e50">
    <link rel="apple-touch-icon" href="icon-192.png">
    
    <style>
        :root {
            --bg-color: #f4f6f9;
            --card-bg: #ffffff;
            --text-color: #333;
            --primary: #2c3e50;
            --accent: #27ae60;
            --danger: #c0392b;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
        }

        h1, h2 {
            text-align: center;
            color: var(--primary);
        }

        .card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            margin-bottom: 25px;
        }

        .section-title {
            font-size: 1.2rem;
            border-bottom: 2px solid var(--primary);
            padding-bottom: 8px;
            margin-bottom: 15px;
            color: var(--primary);
            display: flex;
            justify-content: space-between;
        }

        .input-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            font-size: 0.9rem;
        }

        input[type="number"] {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 1rem;
            text-align: center;
        }

        .result-box {
            background: #ecf0f1;
            padding: 12px;
            border-radius: 8px;
            margin-top: 15px;
            font-weight: bold;
            text-align: center;
            font-size: 1.05rem;
        }

        .highlight-green { color: var(--accent); }
        .highlight-blue { color: #2980b9; }

        .total-card {
            background: var(--primary);
            color: white;
            text-align: center;
            padding: 20px;
            border-radius: 15px;
            font-size: 1.2rem;
        }

        .total-card span {
            display: block;
            font-size: 1.8rem;
            font-weight: bold;
            margin-top: 10px;
            color: #2ecc71;
        }

        /* زر التثبيت الخاص بالـ PWA */
        #installBtn {
            display: none;
            width: 100%;
            padding: 12px;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: bold;
            margin-bottom: 20px;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>📊 مدير الميزانية الشخصية</h1>
    <button id="installBtn">📲 تثبيت التطبيق على الهاتف</button>

    <div class="card">
        <div class="section-title">
            <span>🏠 مصاريف البيت (يونيو 6/2026)</span>
        </div>
        
        <div class="input-group">
            <label>💰 إجمالي المبلغ المرصود للبيت:</label>
            <input type="number" id="house_budget" value="27000" oninput="calculateBudget()">
        </div>

        <hr>

        <div class="input-group"><label>• المصروف الشهري لماما:</label><input type="number" id="h_mama" value="3500" oninput="calculateBudget()"></div>
        <div class="input-group"><label>• منظفات وشامبو ومعجون:</label><input type="number" id="h_cleaning" value="1000" oninput="calculateBudget()"></div>
        <div class="input-group"><label>• أرز (مصري/بسمتي) وخميرة:</label><input type="number" id="h_rice" value="400" oninput="calculateBudget()"></div>
        <div class="input-group"><label>• مواصلات (حسام وفارس):</label><input type="number" id="h_transport" value="250" oninput="calculateBudget()"></div>
        <div class="input-group"><label>• ديون البيت لشهر مايو 5:</label><input type="number" id="h_debts" value="1150" oninput="calculateBudget()"></div>

        <div class="result-box">
            المبلغ المتبقي من مصروف البيت: <span id="house_remaining" class="highlight-green">0</span> جنيه
        </div>
    </div>

    <div class="card">
        <div class="section-title">
            <span>🧑 مصاريف حازم الشخصية</span>
        </div>

        <div class="input-group">
            <label>💰 إجمالي المبلغ المرصود لحازم:</label>
            <input type="number" id="hazem_budget" value="9000" oninput="calculateBudget()">
        </div>

        <hr>

        <div class="input-group"><label>• حلاقة:</label><input type="number" id="z_barber" value="200" oninput="calculateBudget()"></div>
        <div class="input-group"><label>• عطر:</label><input type="number" id="z_perfume" value="700" oninput="calculateBudget()"></div>
        <div class="input-group"><label>• طلعات ومصاريف خارجية وجانبية:</label><input type="number" id="z_outings" value="1100" oninput="calculateBudget()"></div>

        <div class="result-box">
            المبلغ المتبقي من مصروف حازم: <span id="hazem_remaining" class="highlight-green">0</span> جنيه
        </div>
    </div>

    <div class="total-card">
        إجمالي المتبقي (البنك + إنستاباي) حتى الآن
        <span id="grand_total">0 جنيه</span>
    </div>
</div>

<script>
    // الحقول التي نريد حفظ بياناتها تلقائياً
    const fields = [
        'house_budget', 'h_mama', 'h_cleaning', 'h_rice', 'h_transport', 'h_debts',
        'hazem_budget', 'z_barber', 'z_perfume', 'z_outings'
    ];

    // تحميل البيانات المحفوظة عند فتح التطبيق
    window.onload = function() {
        fields.forEach(field => {
            const savedValue = localStorage.getItem(field);
            if (savedValue !== null) {
                document.getElementById(field).value = savedValue;
            }
        });
        calculateBudget();
    };

    // دالة الحساب وحفظ البيانات التلقائي
    function calculateBudget() {
        // قراءة القيم
        const houseBudget = parseFloat(document.getElementById('house_budget').value) || 0;
        const hMama = parseFloat(document.getElementById('h_mama').value) || 0;
        const hCleaning = parseFloat(document.getElementById('h_cleaning').value) || 0;
        const hRice = parseFloat(document.getElementById('h_rice').value) || 0;
        const hTransport = parseFloat(document.getElementById('h_transport').value) || 0;
        const hDebts = parseFloat(document.getElementById('h_debts').value) || 0;

        const hazemBudget = parseFloat(document.getElementById('hazem_budget').value) || 0;
        const zBarber = parseFloat(document.getElementById('z_barber').value) || 0;
        const zPerfume = parseFloat(document.getElementById('z_perfume').value) || 0;
        const zOutings = parseFloat(document.getElementById('z_outings').value) || 0;

        // حفظ القيم الحالية في كاش الهاتف المحلي (localStorage)
        fields.forEach(field => {
            localStorage.setItem(field, document.getElementById(field).value);
        });

        // العمليات الحسابية
        const houseExpenses = hMama + hCleaning + hRice + hTransport + hDebts;
        const houseRemaining = houseBudget - houseExpenses;

        const hazemExpenses = zBarber + zPerfume + zOutings;
        const hazemRemaining = hazemBudget - hazemExpenses;

        const grandTotal = houseRemaining + hazemRemaining;

        // عرض النتائج في الواجهة
        document.getElementById('house_remaining').innerText = houseRemaining.toLocaleString('ar-EG');
        document.getElementById('hazem_remaining').innerText = hazemRemaining.toLocaleString('ar-EG');
        document.getElementById('grand_total').innerText = grandTotal.toLocaleString('ar-EG') + " جنيه";
    }

    // تفعيل الـ Service Worker لتشغيل التطبيق بدون إنترنت
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js')
        .then(() => console.log("Service Worker Registered"))
        .catch(err => console.log("Service Worker Failed", err));
    }

    // كود زر تثبيت التطبيق على شاشة الأندرويد
    let deferredPrompt;
    const installBtn = document.getElementById('installBtn');

    window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        deferredPrompt = e;
        installBtn.style.display = 'block';
    });

    installBtn.addEventListener('click', async () => {
        if (deferredPrompt) {
            deferredPrompt.prompt();
            const { outcome } = await deferredPrompt.userChoice;
            if (outcome === 'accepted') {
                installBtn.style.style.display = 'none';
            }
            deferredPrompt = null;
        }
    });
</script>
</body>
</html>
