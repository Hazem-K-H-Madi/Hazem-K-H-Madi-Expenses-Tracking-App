<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ميزانية يونيو 2026 المطورة</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2c3e50">
    <link rel="apple-touch-icon" href="icon-192.png">
    
    <style>
        :root {
            --bg-color: #f4f6f9;
            --card-bg: #ffffff;
            --text-color: #333;
            --primary: #2c3e50;
            --accent: #27ae60;
            --danger: #c0392b;
            --warning: #f39c12;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 15px;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            color: var(--primary);
            font-size: 1.6rem;
            margin-bottom: 20px;
        }

        .card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            margin-bottom: 25px;
        }

        .section-title {
            font-size: 1.2rem;
            border-bottom: 2px solid var(--primary);
            padding-bottom: 8px;
            margin-bottom: 15px;
            color: var(--primary);
            font-weight: bold;
        }

        .input-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            font-size: 0.95rem;
        }

        input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 1rem;
        }

        .budget-input {
            font-weight: bold;
            background-color: #fcfcfc;
            text-align: center;
            font-size: 1.1rem;
            color: var(--primary);
        }

        /* تصميم قائمة المصاريف الديناميكية */
        .expense-list {
            margin-top: 15px;
        }

        .expense-item {
            display: flex;
            align-items: center;
            gap: 8px;
            background: #f9f9f9;
            padding: 8px;
            border-radius: 8px;
            margin-bottom: 10px;
            border-right: 4px solid var(--primary);
        }

        .expense-item input[type="text"] {
            flex: 2;
        }

        .expense-item input[type="number"] {
            flex: 1;
            text-align: center;
        }

        .btn-delete {
            background: var(--danger);
            color: white;
            border: none;
            padding: 10px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }

        .btn-add {
            background: var(--primary);
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            width: 100%;
            margin-top: 10px;
            font-size: 0.95rem;
        }

        .result-box {
            background: #ecf0f1;
            padding: 12px;
            border-radius: 8px;
            margin-top: 15px;
            font-weight: bold;
            text-align: center;
            font-size: 1.05rem;
        }

        .highlight-green { color: var(--accent); }

        .total-card {
            background: var(--primary);
            color: white;
            text-align: center;
            padding: 20px;
            border-radius: 15px;
            font-size: 1.2rem;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .total-card span {
            display: block;
            font-size: 1.9rem;
            font-weight: bold;
            margin-top: 10px;
            color: #2ecc71;
        }

        #installBtn {
            display: none;
            width: 100%;
            padding: 12px;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: bold;
            margin-bottom: 20px;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>📊 مدير الميزانية الذكي (يونيو 2026)</h1>
    <button id="installBtn">📲 تثبيت التطبيق على الهاتف</button>

    <!-- قسم مصاريف البيت -->
    <div class="card">
        <div class="section-title">🏠 مصاريف البيت</div>
        
        <div class="input-group">
            <label>💰 إجمالي المبلغ المرصود للبيت:</label>
            <input type="number" id="house_budget" class="budget-input" value="27000" oninput="calculateAndSave()">
        </div>

        <label>📝 بنود المصاريف الحالية (يمكنك التعديل مباشرة):</label>
        <div id="house_expenses_container" class="expense-list"></div>
        
        <button class="btn-add" onclick="addExpenseRow('house')">➕ إضافة بند مصروف جديد للبيت</button>

        <div class="result-box">
            المبلغ المتبقي من مصروف البيت: <span id="house_remaining" class="highlight-green">0</span> جنيه
        </div>
    </div>

    <!-- قسم مصاريف حازم الشخصية -->
    <div class="card">
        <div class="section-title">🧑 مصاريف حازم الشخصية</div>

        <div class="input-group">
            <label>💰 إجمالي المبلغ المرصود لحازم:</label>
            <input type="number" id="hazem_budget" class="budget-input" value="9000" oninput="calculateAndSave()">
        </div>

        <label>📝 بنود المصاريف الحالية (يمكنك التعديل مباشرة):</label>
        <div id="hazem_expenses_container" class="expense-list"></div>
        
        <button class="btn-add" onclick="addExpenseRow('hazem')">➕ إضافة بند مصروف جديد لحازم</button>

        <div class="result-box">
            المبلغ المتبقي من مصروف حازم: <span id="hazem_remaining" class="highlight-green">0</span> جنيه
        </div>
    </div>

    <!-- الإجمالي الكلي في البنك وإنستاباي -->
    <div class="total-card">
        إجمالي المتبقي (البنك + إنستاباي) حتى الآن
        <span id="grand_total">0 جنيه</span>
    </div>
</div>

<script>
    // البيانات الافتراضية للتطبيق في أول فتحة له على الهاتف
    const defaultHouseExpenses = [
        { name: "المصروف الشهري المرصود لماما", amount: 3500 },
        { name: "صابون غسيل وجسم ويدين وشامبو ومعجون", amount: 1000 },
        { name: "أرز مصري وأرز بسمتي وخميرة", amount: 400 },
        { name: "مواصلات مشوار حسام وفارس ذهاب وإياب", amount: 250 },
        { name: "ديون البيت لشهر مايو 5/2026", amount: 1150 }
    ];

    const defaultHazemExpenses = [
        { name: "حلاقة", amount: 200 },
        { name: "عطر", amount: 700 },
        { name: "طلعات ومصاريف خارجية وجانبية", amount: 1100 }
    ];

    // تحميل البيانات المحفوظة أو تعيين الافتراضية
    window.onload = function() {
        if (!localStorage.getItem('house_budget')) {
            localStorage.setItem('house_budget', '27000');
            localStorage.setItem('hazem_budget', '9000');
            localStorage.setItem('house_expenses', JSON.stringify(defaultHouseExpenses));
            localStorage.setItem('hazem_expenses', JSON.stringify(defaultHazemExpenses));
        }

        document.getElementById('house_budget').value = localStorage.getItem('house_budget');
        document.getElementById('hazem_budget').value = localStorage.getItem('hazem_budget');

        renderExpenses('house');
        renderExpenses('hazem');
        calculateAndSave();
    };

    // دالة بناء وعرض أسطر المصاريف بناءً على البيانات المحفوظة
    function renderExpenses(type) {
        const container = document.getElementById(`${type}_expenses_container`);
        container.innerHTML = '';
        const expenses = JSON.parse(localStorage.getItem(`${type}_expenses`)) || [];

        expenses.forEach((expense, index) => {
            const row = document.createElement('div');
            row.className = 'expense-item';
            row.innerHTML = `
                <input type="text" value="${expense.name}" placeholder="اسم البند" oninput="updateExpenseData('${type}', ${index}, 'name', this.value)">
                <input type="number" value="${expense.amount}" placeholder="المبلغ" oninput="updateExpenseData('${type}', ${index}, 'amount', this.value)">
                <button class="btn-delete" onclick="deleteExpenseRow('${type}', ${index})">🗑️</button>
            `;
            container.appendChild(row);
        });
    }

    // إضافة سطر مصروف جديد فارغ
    function addExpenseRow(type) {
        const expenses = JSON.parse(localStorage.getItem(`${type}_expenses`)) || [];
        expenses.push({ name: '', amount: 0 });
        localStorage.setItem(`${type}_expenses`, JSON.stringify(expenses));
        renderExpenses(type);
        calculateAndSave();
    }

    // حذف سطر مصروف بالكامل
    function deleteExpenseRow(type, index) {
        const expenses = JSON.parse(localStorage.getItem(`${type}_expenses`)) || [];
        expenses.splice(index, 1);
        localStorage.setItem(`${type}_expenses`, JSON.stringify(expenses));
        renderExpenses(type);
        calculateAndSave();
    }

    // تعديل البيانات عند الكتابة المباشرة داخل الخانات
    function updateExpenseData(type, index, field, value) {
        const expenses = JSON.parse(localStorage.getItem(`${type}_expenses`)) || [];
        if (field === 'amount') {
            expenses[index][field] = parseFloat(value) || 0;
        } else {
            expenses[index][field] = value;
        }
        localStorage.setItem(`${type}_expenses`, JSON.stringify(expenses));
        calculateAndSave(); // تحديث فوري للإجماليات أثناء الكتابة
    }

    // الحساب الشامل وحفظ الميزانية الإجمالية
    function calculateAndSave() {
        const houseBudget = parseFloat(document.getElementById('house_budget').value) || 0;
        const hazemBudget = parseFloat(document.getElementById('hazem_budget').value) || 0;

        localStorage.setItem('house_budget', houseBudget);
        localStorage.setItem('hazem_budget', hazemBudget);

        // حساب مصاريف البيت
        const houseExpensesList = JSON.parse(localStorage.getItem('house_expenses')) || [];
        const totalHouseExpenses = houseExpensesList.reduce((sum, item) => sum + (item.amount || 0), 0);
        const houseRemaining = houseBudget - totalHouseExpenses;

        // حساب مصاريف حازم
        const hazemExpensesList = JSON.parse(localStorage.getItem('hazem_expenses')) || [];
        const totalHazemExpenses = hazemExpensesList.reduce((sum, item) => sum + (item.amount || 0), 0);
        const hazemRemaining = hazemBudget - totalHazemExpenses;

        const grandTotal = houseRemaining + hazemRemaining;

        // العرض في الواجهة
        document.getElementById('house_remaining').innerText = houseRemaining.toLocaleString('ar-EG');
        document.getElementById('hazem_remaining').innerText = hazemRemaining.toLocaleString('ar-EG');
        document.getElementById('grand_total').innerText = grandTotal.toLocaleString('ar-EG') + " جنيه";
    }

    // تشغيل الـ PWA بدون إنترنت
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js')
        .then(() => console.log("Service Worker Active"))
        .catch(err => console.log("Service Worker Error", err));
    }

    // إعدادات زر التثبيت للأندرويد
    let deferredPrompt;
    const installBtn = document.getElementById('installBtn');

    window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        deferredPrompt = e;
        installBtn.style.display = 'block';
    });

    installBtn.addEventListener('click', async () => {
        if (deferredPrompt) {
            deferredPrompt.prompt();
            const { outcome } = await deferredPrompt.userChoice;
            if (outcome === 'accepted') installBtn.style.display = 'none';
            deferredPrompt = null;
        }
    });
</script>
</body>
</html>
