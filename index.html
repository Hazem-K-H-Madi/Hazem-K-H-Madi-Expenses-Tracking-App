<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مدير الميزانية الذكي 2026</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2c3e50">
    <link rel="apple-touch-icon" href="icon-192.png">
    
    <style>
        :root {
            --bg-color: #f4f6f9;
            --card-bg: #ffffff;
            --text-color: #333;
            --primary: #2c3e50;
            --accent: #27ae60;
            --danger: #e74c3c;
            --edit: #f39c12;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 15px;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            color: var(--primary);
            font-size: 1.6rem;
            margin-bottom: 20px;
        }

        .card {
            background: var(--card-bg);
            padding: 15px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            margin-bottom: 20px;
        }

        .section-title {
            font-size: 1.2rem;
            border-bottom: 2px solid var(--primary);
            padding-bottom: 8px;
            margin-bottom: 15px;
            color: var(--primary);
            font-weight: bold;
        }

        .input-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            font-size: 0.95rem;
        }

        input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 1rem;
        }

        .main-budget-input {
            text-align: center;
            font-weight: bold;
            color: var(--primary);
            font-size: 1.1rem;
            border: 2px solid var(--primary);
        }

        /* تنسيق قائمة المصاريف */
        .expense-list {
            margin-top: 15px;
        }

        .expense-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #f8f9fa;
            padding: 8px 12px;
            border-radius: 8px;
            margin-bottom: 8px;
            border-right: 4px solid var(--primary);
        }

        .expense-details {
            flex-grow: 1;
            display: flex;
            justify-content: space-between;
            margin-left: 15px;
        }

        .expense-name { font-weight: 500; }
        .expense-amount { font-weight: bold; color: #555; }

        .action-btns {
            display: flex;
            gap: 5px;
        }

        .btn {
            padding: 6px 10px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            font-size: 0.85rem;
        }

        .btn-danger { background: var(--danger); color: white; }
        .btn-edit { background: var(--edit); color: white; }
        .btn-success { background: var(--accent); color: white; width: 100%; padding: 10px; margin-top: 5px; }

        /* نموذج إضافة مصروف جديد */
        .add-expense-form {
            background: #fdfefe;
            border: 1px dashed #ccc;
            padding: 12px;
            border-radius: 8px;
            margin-top: 15px;
        }

        .form-row {
            display: flex;
            gap: 10px;
            margin-bottom: 8px;
        }

        .result-box {
            background: #ecf0f1;
            padding: 12px;
            border-radius: 8px;
            margin-top: 15px;
            font-weight: bold;
            text-align: center;
            font-size: 1.05rem;
        }

        .highlight-green { color: var(--accent); }

        .total-card {
            background: var(--primary);
            color: white;
            text-align: center;
            padding: 20px;
            border-radius: 15px;
            font-size: 1.2rem;
            box-shadow: 0 4px 15px rgba(0,0,0,0.15);
        }

        .total-card span {
            display: block;
            font-size: 2rem;
            font-weight: bold;
            margin-top: 10px;
            color: #2ecc71;
        }

        #installBtn {
            display: none;
            width: 100%;
            padding: 12px;
            background: #2980b9;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: bold;
            margin-bottom: 20px;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>

<div class="container">
    <h1>📊 مدير الميزانية الشخصية</h1>
    <button id="installBtn">📲 تثبيت التطبيق على الشاشة الرئيسية</button>

    <!-- قسم مصاريف البيت -->
    <div class="card">
        <div class="section-title">🏠 مصاريف البيت (يونيو 6/2026)</div>
        
        <div class="input-group">
            <label>💰 إجمالي المبلغ المرصود للبيت:</label>
            <input type="number" id="house_budget" class="main-budget-input" value="27000" oninput="updateHouseBudget(this.value)">
        </div>

        <div class="expense-list" id="house_expenses_list"></div>

        <!-- فورم إضافة مصروف بيت جديد -->
        <div class="add-expense-form">
            <label style="color: #7f8c8d;">➕ إضافة بند مصروف جديد للبيت:</label>
            <div class="form-row">
                <input type="text" id="new_house_name" placeholder="اسم البند (مثال: لحوم)">
                <input type="number" id="new_house_amount" placeholder="المبلغ">
            </div>
            <button class="btn btn-success" onclick="addExpense('house')">إضافة للبست</button>
        </div>

        <div class="result-box">
            المبلغ المتبقي من مصروف البيت: <span id="house_remaining" class="highlight-green">0</span> جنيه
        </div>
    </div>

    <!-- قسم مصاريف حازم الشخصية -->
    <div class="card">
        <div class="section-title">🧑 مصاريف حازم الشخصية</div>

        <div class="input-group">
            <label>💰 إجمالي المبلغ المرصود لحازم:</label>
            <input type="number" id="hazem_budget" class="main-budget-input" value="9000" oninput="updateHazemBudget(this.value)">
        </div>

        <div class="expense-list" id="hazem_expenses_list"></div>

        <!-- فورم إضافة مصروف شخصي جديد -->
        <div class="add-expense-form">
            <label style="color: #7f8c8d;">➕ إضافة بند مصروف جديد لحازم:</label>
            <div class="form-row">
                <input type="text" id="new_hazem_name" placeholder="اسم البند (مثال: ملابس)">
                <input type="number" id="new_hazem_amount" placeholder="المبلغ">
            </div>
            <button class="btn btn-success" onclick="addExpense('hazem')">إضافة لمصروف حازم</button>
        </div>

        <div class="result-box">
            المبلغ المتبقي من مصروف حازم: <span id="hazem_remaining" class="highlight-green">0</span> جنيه
        </div>
    </div>

    <!-- الإجمالي الكلي -->
    <div class="total-card">
        إجمالي المتبقي (البنك + إنستاباي) حتى الآن
        <span id="grand_total">0 جنيه</span>
    </div>
</div>

<script>
    // الهيكل الافتراضي للبيانات في حال عدم وجود بيانات مسبقة بالهاتف
    let budgetData = {
        houseBudget: 27000,
        hazemBudget: 9000,
        houseExpenses: [
            { id: 1, name: "المصروف الشهري المرصود لماما", amount: 3500 },
            { id: 2, name: "صابون غسيل وجسم ويدين وشامبو ومعجون", amount: 1000 },
            { id: 3, name: "أرز مصري وأرز بسمتي وخميرة", amount: 400 },
            { id: 4, name: "مواصلات مشوار حسام وفارس ذهاب وإياب", amount: 250 },
            { id: 5, name: "ديون البيت لشهر مايو 5/2026", amount: 1150 }
        ],
        hazemExpenses: [
            { id: 1, name: "حلاقة", amount: 200 },
            { id: 2, name: "عطر", amount: 700 },
            { id: 3, name: "طلعات ومصاريف خارجية وجانبية", amount: 1100 }
        ]
    };

    // تحميل البيانات من ذاكرة الهاتف عند الفتح
    window.onload = function() {
        const savedData = localStorage.getItem('pwa_budget_data_2026');
        if (savedData) {
            budgetData = JSON.parse(savedData);
        }
        
        // تعيين قيم الميزانيات الرئيسية في المدخلات
        document.getElementById('house_budget').value = budgetData.houseBudget;
        document.getElementById('hazem_budget').value = budgetData.hazemBudget;
        
        renderApp();
    };

    // حفظ البيانات الحالية في الهاتف
    function saveToStorage() {
        localStorage.setItem('pwa_budget_data_2026', JSON.stringify(budgetData));
    }

    function updateHouseBudget(val) {
        budgetData.houseBudget = parseFloat(val) || 0;
        saveToStorage();
        calculateTotals();
    }

    function updateHazemBudget(val) {
        budgetData.hazemBudget = parseFloat(val) || 0;
        saveToStorage();
        calculateTotals();
    }

    // عرض القوائم وحساب الإجمالي
    function renderApp() {
        renderList('house');
        renderList('hazem');
        calculateTotals();
    }

    // دالة بناء وتحديث القوائم في الواجهة
    function renderList(type) {
        const listContainer = document.getElementById(`${type}_expenses_list`);
        const expenses = type === 'house' ? budgetData.houseExpenses : budgetData.hazemExpenses;
        
        listContainer.innerHTML = '';
        
        expenses.forEach(item => {
            const itemDiv = document.createElement('div');
            itemDiv.className = 'expense-item';
            itemDiv.innerHTML = `
                <div class="expense-details">
                    <span class="expense-name">${item.name}</span>
                    <span class="expense-amount">${item.amount} جنيه</span>
                </div>
                <div class="action-btns">
                    <button class="btn btn-edit" onclick="editExpense('${type}', ${item.id})">تعديل</button>
                    <button class="btn btn-danger" onclick="deleteExpense('${type}', ${item.id})">حذف</button>
                </div>
            `;
            listContainer.appendChild(itemDiv);
        });
    }

    // دالة الحسابات الشاملة
    function calculateTotals() {
        const totalHouseExpenses = budgetData.houseExpenses.reduce((sum, item) => sum + item.amount, 0);
        const houseRemaining = budgetData.houseBudget - totalHouseExpenses;
        
        const totalHazemExpenses = budgetData.hazemExpenses.reduce((sum, item) => sum + item.amount, 0);
        const hazemRemaining = budgetData.hazemBudget - totalHazemExpenses;
        
        const grandTotal = houseRemaining + hazemRemaining;

        document.getElementById('house_remaining').innerText = houseRemaining.toLocaleString('ar-EG');
        document.getElementById('hazem_remaining').innerText = hazemRemaining.toLocaleString('ar-EG');
        document.getElementById('grand_total').innerText = grandTotal.toLocaleString('ar-EG') + " جنيه";
    }

    // ميزة إضافة مصروف جديد
    function addExpense(type) {
        const nameInput = document.getElementById(`new_${type}_name`);
        const amountInput = document.getElementById(`new_${type}_amount`);
        
        const name = nameInput.value.trim();
        const amount = parseFloat(amountInput.value) || 0;
        
        if (name === '' || amount <= 0) {
            alert('من فضلك أدخل اسم البند والمبلغ بشكل صحيح.');
            return;
        }
        
        const expenses = type === 'house' ? budgetData.houseExpenses : budgetData.hazemExpenses;
        const newId = expenses.length > 0 ? Math.max(...expenses.map(i => i.id)) + 1 : 1;
        
        expenses.push({ id: newId, name: name, amount: amount });
        
        // تصغير الحقول بعد الإضافة
        nameInput.value = '';
        amountInput.value = '';
        
        saveToStorage();
        renderApp();
    }

    // ميزة حذف مصروف قديم
    function deleteExpense(type, id) {
        if (confirm("هل أنت متأكد من حذف هذا البند؟")) {
            if (type === 'house') {
                budgetData.houseExpenses = budgetData.houseExpenses.filter(item => item.id !== id);
            } else {
                budgetData.hazemExpenses = budgetData.hazemExpenses.filter(item => item.id !== id);
            }
            saveToStorage();
            renderApp();
        }
    }

    // ميزة تعديل مصروف قديم
    function editExpense(type, id) {
        const expenses = type === 'house' ? budgetData.houseExpenses : budgetData.hazemExpenses;
        const item = expenses.find(i => i.id === id);
        
        if (item) {
            const newName = prompt("تعديل اسم البند:", item.name);
            if (newName === null) return; // إلغاء التعديل
            
            const newAmountStr = prompt("تعديل المبلغ:", item.amount);
            if (newAmountStr === null) return;
            
            const newAmount = parseFloat(newAmountStr) || 0;
            
            if (newName.trim() !== '' && newAmount > 0) {
                item.name = newName.trim();
                item.amount = newAmount;
                saveToStorage();
                renderApp();
            } else {
                alert("البيانات المدخلة غير صالحة.");
            }
        }
    }

    // تفعيل الـ Service Worker للتشغيل أوفلاين
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js')
        .then(() => console.log("Service Worker Registered Ready for Offline"))
        .catch(err => console.log("Service Worker Failed", err));
    }

    // إدارة زر تثبيت التطبيق على الأندرويد
    let deferredPrompt;
    const installBtn = document.getElementById('installBtn');

    window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        deferredPrompt = e;
        installBtn.style.display = 'block';
    });

    installBtn.addEventListener('click', async () => {
        if (deferredPrompt) {
            deferredPrompt.prompt();
            const { outcome } = await deferredPrompt.userChoice;
            if (outcome === 'accepted') {
                installBtn.style.display = 'none';
            }
            deferredPrompt = null;
        }
    });
</script>
</body>
</html>
