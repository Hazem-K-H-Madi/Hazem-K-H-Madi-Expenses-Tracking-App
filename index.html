<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إدارة الميزانية الذكية</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2c3e50">
    <link rel="apple-touch-icon" href="icon-192.png">
    
    <style>
        :root {
            --bg-color: #f4f6f9;
            --card-bg: #ffffff;
            --text-color: #333;
            --primary: #2c3e50;
            --accent: #27ae60;
            --danger: #e74c3c;
            --warning: #f39c12;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 15px;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
        }

        .header-area {
            text-align: center;
            margin-bottom: 20px;
        }

        .editable-title {
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--primary);
            border: none;
            background: transparent;
            text-align: center;
            width: 100%;
            margin-bottom: 5px;
        }
        .editable-title:focus {
            background: #fff;
            border-bottom: 2px dashed var(--primary);
            outline: none;
        }

        .card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            margin-bottom: 20px;
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--primary);
            padding-bottom: 8px;
            margin-bottom: 15px;
        }

        .section-title {
            font-size: 1.2rem;
            font-weight: bold;
            color: var(--primary);
        }

        .budget-input-group {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #f8f9fa;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 15px;
        }

        .budget-input-group input {
            width: 120px;
            padding: 6px;
            border: 1px solid #ccc;
            border-radius: 6px;
            text-align: center;
            font-size: 1rem;
            font-weight: bold;
        }

        /* جدول/قائمة المصاريف الديناميكية */
        .expense-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #eee;
        }

        .expense-details {
            flex-grow: 1;
            display: flex;
            gap: 10px;
        }

        .expense-details input {
            border: none;
            background: transparent;
            font-size: 1rem;
            padding: 4px;
        }
        .expense-details input:focus {
            background: #eef2f7;
            outline: none;
            border-radius: 4px;
        }
        .exp-desc { width: 65%; }
        .exp-amt { width: 30%; text-align: left; font-weight: bold; color: var(--primary); }

        .btn-delete {
            background: none;
            border: none;
            color: var(--danger);
            font-size: 1.2rem;
            cursor: pointer;
            padding: 0 10px;
        }

        /* نموذج إضافة مصروف جديد */
        .add-form {
            display: flex;
            gap: 8px;
            margin-top: 15px;
            background: #f9f9f9;
            padding: 10px;
            border-radius: 8px;
        }

        .add-form input {
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 0.9rem;
        }
        .add-form .in-desc { flex-grow: 2; }
        .add-form .in-amt { width: 80px; text-align: center; }
        
        .btn-add {
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 6px;
            padding: 8px 15px;
            cursor: pointer;
            font-weight: bold;
        }

        .result-box {
            background: #ecf0f1;
            padding: 12px;
            border-radius: 8px;
            margin-top: 15px;
            font-weight: bold;
            text-align: center;
            font-size: 1.05rem;
        }

        .highlight-green { color: var(--accent); }

        .total-card {
            background: var(--primary);
            color: white;
            text-align: center;
            padding: 20px;
            border-radius: 15px;
            font-size: 1.2rem;
        }

        .total-card span {
            display: block;
            font-size: 1.8rem;
            font-weight: bold;
            margin-top: 10px;
            color: #2ecc71;
        }

        #installBtn {
            display: none;
            width: 100%;
            padding: 12px;
            background: #2980b9;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: bold;
            margin-bottom: 20px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header-area">
        <!-- عنوان الشهر قابل للتعديل المباشر بالضغط عليه -->
        <input type="text" id="month_title" class="editable-title" value="مصاريف يونيو 6/2026" onchange="saveData()">
        <small style="color: #7f8c8d; display:block; margin-bottom:15px;">(اضغط على أي نص أو رقم لتعديله فوراً)</small>
        <button id="installBtn">📲 تثبيت التطبيق على الهاتف للاستخدام أوفلاين</button>
    </div>

    <!-- قسم مصاريف البيت -->
    <div class="card">
        <div class="section-header">
            <span class="section-title">🏠 مصاريف البيت</span>
        </div>
        
        <div class="budget-input-group">
            <label>المبلغ المرصود للبيت:</label>
            <div>
                <input type="number" id="house_budget" value="27000" oninput="calculateAndSave()">
                <span>ج.م</span>
            </div>
        </div>

        <!-- قائمة مصاريف البيت الديناميكية -->
        <div id="house_expenses_list"></div>

        <!-- نموذج إضافة مصروف بيت جديد -->
        <div class="add-form">
            <input type="text" id="new_house_desc" class="in-desc" placeholder="بند جديد (مثال: لحوم)">
            <input type="number" id="new_house_amt" class="in-amt" placeholder="المبلغ">
            <button class="btn-add" onclick="addExpense('house')">إضافة</button>
        </div>

        <div class="result-box">
            المتبقي من مصروف البيت: <span id="house_remaining" class="highlight-green">0</span> جنيه
        </div>
    </div>

    <!-- قسم مصاريف حازم -->
    <div class="card">
        <div class="section-header">
            <span class="section-title">🧑 مصاريف حازم الشخصية</span>
        </div>

        <div class="budget-input-group">
            <label>المبلغ المرصود لحازم:</label>
            <div>
                <input type="number" id="hazem_budget" value="9000" oninput="calculateAndSave()">
                <span>ج.م</span>
            </div>
        </div>

        <!-- قائمة مصاريف حازم الديناميكية -->
        <div id="hazem_expenses_list"></div>

        <!-- نموذج إضافة مصروف حازم جديد -->
        <div class="add-form">
            <input type="text" id="new_hazem_desc" class="in-desc" placeholder="بند جديد (مثال: ملابس)">
            <input type="number" id="new_hazem_amt" class="in-amt" placeholder="المبلغ">
            <button class="btn-add" onclick="addExpense('hazem')">إضافة</button>
        </div>

        <div class="result-box">
            المتبقي من مصروف حازم: <span id="hazem_remaining" class="highlight-green">0</span> جنيه
        </div>
    </div>

    <!-- الإجمالي الكلي -->
    <div class="total-card">
        إجمالي المتبقي (البنك + إنستاباي) حتى الآن
        <span id="grand_total">0 جنيه</span>
    </div>
</div>

<script>
    // البيانات الافتراضية الأولية في حال لم يسبق حفظ بيانات
    const defaultData = {
        monthTitle: "مصاريف يونيو 6/2026",
        houseBudget: 27000,
        hazemBudget: 9000,
        houseExpenses: [
            { desc: "المصروف الشهري المرصود لماما", amt: 3500 },
            { desc: "صابون غسيل و جسم و يدين و شامبو و معجون و فرش أسنان", amt: 1000 },
            { desc: "أرز مصري و أرز بسمتي و خميرة", amt: 400 },
            { desc: "مواصلات مشوار حسام و فارس ذهاب و إياب", amt: 250 },
            { desc: "ديون البيت لشهر مايو 5/2026", amt: 1150 }
        ],
        hazemExpenses: [
            { desc: "حلاقة", amt: 200 },
            { desc: "عطر", amt: 700 },
            { desc: "طلعات و مصاريف خارجية و جانبية", amt: 1100 }
        ]
    };

    let appData = {};

    // تحميل البيانات عند فتح التطبيق
    window.onload = function() {
        const savedData = localStorage.getItem('smart_budget_pwa_data');
        if (savedData) {
            appData = JSON.parse(savedData);
        } else {
            appData = defaultData;
        }
        initApp();
    };

    function initApp() {
        document.getElementById('month_title').value = appData.monthTitle;
        document.getElementById('house_budget').value = appData.houseBudget;
        document.getElementById('hazem_budget').value = appData.hazemBudget;
        
        renderExpenses('house');
        renderExpenses('hazem');
        calculateAndSave();
    }

    // بناء وعرض عناصر المصاريف داخل القائمة مع خاصية التعديل المباشر
    function renderExpenses(type) {
        const listContainer = document.getElementById(`${type}_expenses_list`);
        const expensesArray = type === 'house' ? appData.houseExpenses : appData.hazemExpenses;
        
        listContainer.innerHTML = '';
        
        expensesArray.forEach((expense, index) => {
            const itemDiv = document.createElement('div');
            itemDiv.className = 'expense-item';
            itemDiv.innerHTML = `
                <div class="expense-details">
                    <input type="text" class="exp-desc" value="${expense.desc}" onchange="updateExpense('${type}', ${index}, 'desc', this.value)">
                    <input type="number" class="exp-amt" value="${expense.amt}" oninput="updateExpense('${type}', ${index}, 'amt', this.value)">
                </div>
                <button class="btn-delete" onclick="deleteExpense('${type}', ${index})" title="حذف">🗑️</button>
            `;
            listContainer.appendChild(itemDiv);
        });
    }

    // إضافة بند مصروف جديد
    function addExpense(type) {
        const descInput = document.getElementById(`new_${type}_desc`);
        const amtInput = document.getElementById(`new_${type}_amt`);
        
        const desc = descInput.value.trim();
        const amt = parseFloat(amtInput.value) || 0;
        
        if (desc === '' || amt <= 0) {
            alert('الرجاء إدخال اسم البند والمبلغ بشكل صحيح.');
            return;
        }
        
        const targetArray = type === 'house' ? appData.houseExpenses : appData.hazemExpenses;
        targetArray.push({ desc: desc, amt: amt });
        
        descInput.value = '';
        amtInput.value = '';
        
        renderExpenses(type);
        calculateAndSave();
    }

    // تعديل بند موجود بشكل مباشر
    function updateExpense(type, index, field, value) {
        const targetArray = type === 'house' ? appData.houseExpenses : appData.hazemExpenses;
        if (field === 'amt') {
            targetArray[index].amt = parseFloat(value) || 0;
        } else {
            targetArray[index].desc = value;
        }
        calculateAndSave();
    }

    // حذف بند مصروف
    function deleteExpense(type, index) {
        if(confirm("هل أنت متأكد من رغبتك في حذف هذا البند؟")) {
            const targetArray = type === 'house' ? appData.houseExpenses : appData.hazemExpenses;
            targetArray.splice(index, 1);
            renderExpenses(type);
            calculateAndSave();
        }
    }

    // الحساب الشامل والاتصال بذاكرة الهاتف للحفظ
    function calculateAndSave() {
        appData.monthTitle = document.getElementById('month_title').value;
        appData.houseBudget = parseFloat(document.getElementById('house_budget').value) || 0;
        appData.hazemBudget = parseFloat(document.getElementById('hazem_budget').value) || 0;

        // حساب مصاريف البيت
        const totalHouseSpent = appData.houseExpenses.reduce((sum, item) => sum + item.amt, 0);
        const houseRemaining = appData.houseBudget - totalHouseSpent;
        document.getElementById('house_remaining').innerText = houseRemaining.toLocaleString('ar-EG');

        // حساب مصاريف حازم
        const totalHazemSpent = appData.hazemExpenses.reduce((sum, item) => sum + item.amt, 0);
        const hazemRemaining = appData.hazemBudget - totalHazemSpent;
        document.getElementById('hazem_remaining').innerText = hazemRemaining.toLocaleString('ar-EG');

        // الإجمالي الكلي
        const grandTotal = houseRemaining + hazemRemaining;
        document.getElementById('grand_total').innerText = grandTotal.toLocaleString('ar-EG') + " جنيه";

        // الحفظ الفوري في ذاكرة التخزين المحلية الآمنة
        localStorage.setItem('smart_budget_pwa_data', JSON.stringify(appData));
    }

    function saveData() {
        calculateAndSave();
    }

    // تشغيل الـ Service Worker للأوفلاين
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js')
        .then(() => console.log("Service Worker Active"))
        .catch(err => console.log("Service Worker Error", err));
    }

    // آلية ظهور زر التثبيت كتطبيق مستقل على الأندرويد
    let deferredPrompt;
    const installBtn = document.getElementById('installBtn');

    window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        deferredPrompt = e;
        installBtn.style.display = 'block';
    });

    installBtn.addEventListener('click', async () => {
        if (deferredPrompt) {
            deferredPrompt.prompt();
            const { outcome } = await deferredPrompt.userChoice;
            if (outcome === 'accepted') {
                installBtn.style.display = 'none';
            }
            deferredPrompt = null;
        }
    });
</script>
</body>
</html>
