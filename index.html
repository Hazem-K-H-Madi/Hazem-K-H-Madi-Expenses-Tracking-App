<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مدير مصاريف البيت وحازم</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2c3e50">
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f6f9;
            margin: 0;
            padding: 20px;
            color: #333;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
        }
        h1, h2 {
            text-align: center;
            color: #2c3e50;
        }
        .card {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            margin-bottom: 20px;
        }
        .total-box {
            background: #e1f5fe;
            border-right: 5px solid #0288d1;
            padding: 15px;
            border-radius: 6px;
            font-weight: bold;
            font-size: 1.1rem;
            margin-bottom: 15px;
        }
        .remaining-box {
            background: #e8f5e9;
            border-right: 5px solid #388e3c;
            padding: 15px;
            border-radius: 6px;
            font-weight: bold;
            font-size: 1.1rem;
            margin-top: 15px;
        }
        .bank-box {
            background: #fff3e0;
            border-right: 5px solid #f57c00;
            text-align: center;
            font-size: 1.2rem;
        }
        ul {
            list-style: none;
            padding: 0;
        }
        li {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid #eee;
        }
        .expense-title {
            flex: 1;
        }
        .expense-amount {
            font-weight: bold;
            color: #c0392b;
            margin-left: 15px;
        }
        .btn-delete {
            background: #ff7675;
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 4px;
            cursor: pointer;
        }
        .add-form {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }
        input, select, button {
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 0.9rem;
        }
        input[type="text"] { flex: 2; }
        input[type="number"] { flex: 1; }
        .btn-add {
            background: #2ecc71;
            color: white;
            border: none;
            cursor: pointer;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>📊 ميزانية شهر يونيو 6/2026</h1>

    <div class="card">
        <h2>🏠 مصاريف البيت</h2>
        <div class="total-box">المبلغ المرصود للبيت: 27000 جنيه</div>
        <ul id="home-expenses-list"></ul>
        <div class="add-form">
            <input type="text" id="home-title" placeholder="البند (مثال: أرز)">
            <input type="number" id="home-amount" placeholder="المبلغ">
            <button class="btn-add" onclick="addExpense('home')">+</button>
        </div>
        <div class="remaining-box" id="home-remaining">المتبقي للبيت: 27000 جنيه</div>
    </div>

    <div class="card">
        <h2>👤 مصاريف حازم الشخصية</h2>
        <div class="total-box">المبلغ المرصود لحازم: 9000 جنيه</div>
        <ul id="hazem-expenses-list"></ul>
        <div class="add-form">
            <input type="text" id="hazem-title" placeholder="البند (مثال: حلاقة)">
            <input type="number" id="hazem-amount" placeholder="المبلغ">
            <button class="btn-add" onclick="addExpense('hazem')">+</button>
        </div>
        <div class="remaining-box" id="hazem-remaining">المتبقي لحازم: 9000 جنيه</div>
    </div>

    <div class="card bank-box" id="total-bank">
        إجمالي المتبقي في البنك و إنستاباي: 36000 جنيه
    </div>
</div>

<script>
    // إعداد قواعد البيانات (IndexedDB) لحفظ البيانات على الهاتف بشكل آمن ودائم
    let db;
    const request = indexedDB.open("BudgetDB", 1);

    request.onupgradeneeded = function(e) {
        db = e.target.result;
        db.createObjectStore("expenses", { keyPath: "id", autoIncrement: true });
    };

    request.onsuccess = function(e) {
        db = e.target.result;
        loadInitialDataIfNeeded();
    };

    // البيانات الأولية التي أرسلتها في رسالتك لتظهر فور تشغيل التطبيق لأول مرة
    const initialExpenses = [
        { type: 'home', title: 'المصروف الشهري لماما', amount: 3500 },
        { type: 'home', title: 'صابون غسيل وجسم وشامبو ومعجون', amount: 1000 },
        { type: 'home', title: 'أرز مصري وبسمتي وخميرة', amount: 400 },
        { type: 'home', title: 'مواصلات مشوار حسام وفارس', amount: 250 },
        { type: 'home', title: 'ديون البيت لشهر مايو 5/2026', amount: 1150 },
        { type: 'hazem', title: 'حلاقة', amount: 200 },
        { type: 'hazem', title: 'عطر', amount: 700 },
        { type: 'hazem', title: 'طلعات ومصاريف خارجية وجانبية', amount: 1100 }
    ];

    function loadInitialDataIfNeeded() {
        const tx = db.transaction("expenses", "readonly");
        const store = tx.objectStore("expenses");
        const countRequest = store.count();

        countRequest.onsuccess = function() {
            if (countRequest.result === 0) {
                const writeTx = db.transaction("expenses", "readwrite");
                const writeStore = writeTx.objectStore("expenses");
                initialExpenses.forEach(exp => writeStore.add(exp));
                writeTx.oncomplete = render;
            } else {
                render();
            }
        };
    }

    function render() {
        const tx = db.transaction("expenses", "readonly");
        const store = tx.objectStore("expenses");
        const getAll = store.getAll();

        getAll.onsuccess = function() {
            const expenses = getAll.result;
            
            let homeBudget = 27000;
            let hazemBudget = 9000;
            
            const homeList = document.getElementById('home-expenses-list');
            const hazemList = document.getElementById('hazem-expenses-list');
            
            homeList.innerHTML = '';
            hazemList.innerHTML = '';

            expenses.forEach(exp => {
                const li = document.createElement('li');
                li.innerHTML = `
                    <span class="expense-title">${exp.title}</span>
                    <span class="expense-amount">${exp.amount} جنيه</span>
                    <button class="btn-delete" onclick="deleteExpense(${exp.id})">حذف</button>
                `;

                if (exp.type === 'home') {
                    homeList.appendChild(li);
                    homeBudget -= exp.amount;
                } else if (exp.type === 'hazem') {
                    hazemList.appendChild(li);
                    hazemBudget -= exp.amount;
                }
            });

            document.getElementById('home-remaining').innerText = `إجمالي المبلغ المتبقي من مصروف البيت حتى الآن ← (${homeBudget} جنيه)`;
            document.getElementById('hazem-remaining').innerText = `إجمالي المبلغ المتبقي من مصروف حازم الشخصي حتى الآن ← (${hazemBudget} جنيه)`;
            document.getElementById('total-bank').innerText = `إجمالي المبلغ المتبقي مجموع في البنك و إنستاباي حتى الآن ← (${homeBudget + hazemBudget} جنيه)`;
        };
    }

    function addExpense(type) {
        const titleInput = document.getElementById(`${type}-title`);
        const amountInput = document.getElementById(`${type}-amount`);
        
        const title = titleInput.value.trim();
        const amount = parseFloat(amountInput.value);

        if (!title || isNaN(amount) || amount <= 0) return alert('برجاء إدخال بيانات صحيحة');

        const tx = db.transaction("expenses", "readwrite");
        const store = tx.objectStore("expenses");
        
        store.add({ type, title, amount });
        
        tx.oncomplete = function() {
            titleInput.value = '';
            amountInput.value = '';
            render();
        };
    }

    function deleteExpense(id) {
        const tx = db.transaction("expenses", "readwrite");
        const store = tx.objectStore("expenses");
        store.delete(id);
        tx.oncomplete = render;
    }

    // تفعيل الـ Service Worker لتشغيل التطبيق بدون إنترنت
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js');
    }
</script>
</body>
</html>
